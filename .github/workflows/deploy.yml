name: Test & Build

on:
  push:
    # main is the canonical source — deploys the GitHub Pages preview.
    # (Still a preview: noindex on, no custom domain yet. See PREVIEW_NOINDEX in src/consts.ts.)
    branches: [main]
  pull_request:
    # Gate PRs with the same build/test/link-check suite before merge. Never
    # deploys — the deploy job below only runs on a push to main.
    branches: [main]
  workflow_dispatch: # allow manual runs

permissions:
  contents: read

# One run at a time per ref; a superseded run on the SAME ref is cancelled.
# main's push runs and each PR's runs land in different groups (github.ref
# differs per PR), so a new PR push can never cancel an in-flight Pages deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # SHA-pinned (supply-chain hardening). SHA verified against the tag via the GitHub API.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # withastro/action installs deps, runs astro check + astro build, and uploads
      # the Pages artifact. v3 is the current release for Astro 6.
      # (verified: docs.astro.build/en/guides/deploy/github/)
      - name: Build with Astro
        uses: withastro/action@56781b97402ce0487b7e61ce2cb960c0e2cc5289 # v3.0.2
        with:
          node-version: 22

      # Unit tests — run AFTER build so import.meta.env.PROD is irrelevant to dist/,
      # but these are pure-logic tests that don't need dist/. Both gates must pass
      # before the deploy job is allowed to run (it depends on this job via `needs: build`)
      # — and, on a PR, before it's mergeable once branch protection requires this check.
      - name: Unit tests (vitest)
        run: npm test

      # Link-integrity + draft-exclusion gate — requires dist/ to exist (built above).
      # Scans every HTML file for root-absolute hrefs missing the base prefix, and
      # asserts no draft: true post was emitted into dist/blog/.
      - name: Link-integrity & draft-exclusion gate
        run: npm run test:links

  deploy:
    name: Deploy
    needs: build
    # Deploy only on a push to main — never on a pull_request event, even one
    # opened against main. Keeps every PR run build/test/link-check only.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
