# CodeQL — static application security testing (SAST) for the Wisco Radio Labs website
#
# Scans the JavaScript/TypeScript source (Astro components, build scripts) for
# security-relevant bug patterns (injection, prototype pollution, unsafe
# deserialization, etc.) on every PR, every push to main, and once a week so
# newly-published CodeQL queries catch code that was clean when it last changed.
#
# This is a static Astro site with no backend and near-zero attack surface, so
# CodeQL's web/server queries will mostly be quiet here — that is expected and
# correct. We run it as a low-noise tripwire and a roadmap-ready baseline, and
# to bring the public repos to a uniform security posture with CW Trainer. Do
# NOT tune the query suite to "find something" — a quiet pass is the honest
# result.
#
# Workflow-based (advanced) CodeQL setup mirrors CW Trainer so the two public
# repos are configured the same way. It needs no special token scope: the job
# runs with security-events:write on the GITHUB_TOKEN.
#
# Owned by the security-engineer (separate from deploy.yml, which is build+deploy).

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 07:17 UTC. Off-peak and not on the hour to avoid the scheduler
    # stampede. Weekly is the right cadence for a low-churn static site.
    - cron: '17 7 * * 1'

# Default to nothing; the analyze job elevates only what CodeQL needs.
permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Required by CodeQL:
      security-events: write   # upload results to the Security tab
      contents: read           # checkout the source
      # actions: read is only needed for private repos; this repo is public,
      # so it is omitted to keep the grant minimal.

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        # github/codeql-action/init v4.37.1
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: javascript-typescript
          # Default query suite (standard security queries only); no override.

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze v4.37.1
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          category: '/language:javascript-typescript'
